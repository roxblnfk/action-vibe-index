name: 'Vibe Index'
description: 'Measure the ratio of human-written vs AI-generated code and generate a badge'
author: 'Alexei Gagarin'

inputs:
  commits-count:
    description: 'Number of recent commits to analyze (default: 500)'
    required: false
    default: '500'

  co-author-multiplier:
    description: 'Multiplier for co-authored code (0.0 to 1.0, default: 0.8) — share of an AI co-authored commit credited to AI'
    required: false
    default: '0.8'

  extra-bot-patterns:
    description: 'Additional regular expressions (one per line) matched against commit author and Co-Authored-By identities, merged on top of the built-in bot/AI signatures. Use to detect agents or automation bots specific to your team, e.g. "@mycorp-bot\.com". Leave empty to use the built-in list only.'
    required: false
    default: ''

  badge-style:
    description: 'Shield.io badge style (flat, flat-square, plastic, for-the-badge, social)'
    required: false
    default: 'flat-square'

  badge-color:
    description: 'Badge color: "auto" (default) interpolates a color along the green->purple gradient from the score, or pass a fixed hex (without #) / named color'
    required: false
    default: 'auto'

  badge-logo:
    description: 'Optional logo to show on the badge (a simple-icons slug, e.g. "github")'
    required: false
    default: ''

  assert-index:
    description: 'Optional range for assertion (e.g., "7.0-10.0" or "5.0-8.0"). Action will fail if index is outside this range'
    required: false
    default: ''

  badge-output-file:
    description: 'File to write badge URL to (e.g., badge-url.txt)'
    required: false
    default: ''

  update-files:
    description: 'Comma- or newline-separated list of markdown files whose badge to update in place between the "<!-- vibe-index:start -->" and "<!-- vibe-index:end -->" markers. Set to an empty string to disable.'
    required: false
    default: 'README.md'

  commit:
    description: 'Commit the updated files automatically (requires permissions: contents: write). Default false.'
    required: false
    default: 'false'

  push:
    description: 'Push the auto-commit to the current branch (only used when commit is true). Default false.'
    required: false
    default: 'false'

  commit-message:
    description: 'Commit message used by the auto-commit'
    required: false
    default: 'chore: update Vibe Index badge'

  commit-user-name:
    description: 'git user.name for the auto-commit'
    required: false
    default: 'github-actions[bot]'

  commit-user-email:
    description: 'git user.email for the auto-commit'
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'

  include-message:
    description: 'Custom message/label for badge (default: "Vibe Index")'
    required: false
    default: 'Vibe Index'

outputs:
  vibe-index:
    description: 'Calculated Vibe Index score (0.0-10.0)'

  human-percentage:
    description: 'Percentage of code written by humans'

  ai-percentage:
    description: 'Percentage of code written by AI'

  human-commits-percentage:
    description: 'Percentage of commits from humans'

  ai-commits-percentage:
    description: 'Percentage of commits from AI'

  badge-url:
    description: 'Generated badge URL (shields.io)'

  badge-markdown:
    description: 'Markdown syntax for embedding badge'

runs:
  using: 'node24'
  main: 'src/index.js'

branding:
  icon: 'activity'
  color: 'blue'
