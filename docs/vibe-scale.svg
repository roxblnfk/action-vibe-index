<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 128" width="760" height="128" role="img" aria-label="Vibe Index scale: 0 means hand-crafted by a human, 10 means fully written by AI">
  <defs>
    <linearGradient id="vibe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#27ae60"/>
      <stop offset="0.25" stop-color="#1abc9c"/>
      <stop offset="0.5"  stop-color="#3498db"/>
      <stop offset="0.75" stop-color="#6c5ce7"/>
      <stop offset="1"    stop-color="#8a2be2"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="40" y="40" width="680" height="30" rx="6" ry="6"/>
    </clipPath>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="756" height="124" rx="12" ry="12" fill="#ffffff" stroke="#e1e4e8" stroke-width="1.5"/>

  <!-- end labels -->
  <text x="40" y="30" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#24292f">🛠️ Grind</text>
  <text x="720" y="30" text-anchor="end" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#24292f">Vibe ✨</text>

  <!-- smooth gradient bar -->
  <g clip-path="url(#round)">
    <rect x="40" y="40" width="680" height="30" fill="url(#vibe)"/>
  </g>
  <rect x="40" y="40" width="680" height="30" rx="6" ry="6" fill="none" stroke="#00000022" stroke-width="1"/>

  <!-- tick numbers -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#57606a" text-anchor="middle">
    <text x="40"  y="89">0</text>
    <text x="176" y="89">2</text>
    <text x="312" y="89">4</text>
    <text x="448" y="89">6</text>
    <text x="584" y="89">8</text>
    <text x="720" y="89">10</text>
  </g>

  <!-- bucket labels -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#57606a" text-anchor="middle">
    <text x="108" y="111">Hand-Crafted</text>
    <text x="244" y="111">Human-Focused</text>
    <text x="380" y="111">Balanced</text>
    <text x="516" y="111">AI-Assisted</text>
    <text x="652" y="111">AI-Heavy</text>
  </g>
</svg>
