<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 150" width="760" height="150" role="img" aria-label="Vibe Index scale: 0 means hand-crafted by a human, 10 means fully written by AI">
  <defs>
    <clipPath id="round">
      <rect x="40" y="70" width="680" height="26" rx="6" ry="6"/>
    </clipPath>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="756" height="146" rx="12" ry="12" fill="#ffffff" stroke="#e1e4e8" stroke-width="1.5"/>

  <!-- title -->
  <text x="380" y="28" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#24292f">Vibe Index</text>
  <text x="380" y="46" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#57606a">how much of the code was written by AI vs by hand</text>

  <!-- end labels -->
  <text x="40" y="63" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#24292f">👤 hand-crafted</text>
  <text x="720" y="63" text-anchor="end" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#24292f">vibe-coded 🤖</text>

  <!-- gradient bar (5 buckets, matching badge colors) -->
  <g clip-path="url(#round)">
    <rect x="40"  y="70" width="136" height="26" fill="#27ae60"/>
    <rect x="176" y="70" width="136" height="26" fill="#3498db"/>
    <rect x="312" y="70" width="136" height="26" fill="#f39c12"/>
    <rect x="448" y="70" width="136" height="26" fill="#e67e22"/>
    <rect x="584" y="70" width="136" height="26" fill="#e74c3c"/>
  </g>
  <rect x="40" y="70" width="680" height="26" rx="6" ry="6" fill="none" stroke="#00000022" stroke-width="1"/>

  <!-- tick numbers -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#57606a" text-anchor="middle">
    <text x="40"  y="113">0</text>
    <text x="176" y="113">2</text>
    <text x="312" y="113">4</text>
    <text x="448" y="113">6</text>
    <text x="584" y="113">8</text>
    <text x="720" y="113">10</text>
  </g>

  <!-- bucket labels -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#57606a" text-anchor="middle">
    <text x="108" y="132">Hand-Crafted</text>
    <text x="244" y="132">Human-Focused</text>
    <text x="380" y="132">Balanced</text>
    <text x="516" y="132">AI-Assisted</text>
    <text x="652" y="132">AI-Heavy</text>
  </g>
</svg>
