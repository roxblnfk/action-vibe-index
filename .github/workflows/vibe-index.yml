name: Vibe Index

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vibe-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history is required for analysis

      - name: Calculate Vibe Index, update and commit README badge
        id: vibe
        uses: ./
        with:
          # update-files defaults to README.md: the badge between the markers is
          # rewritten in place.
          # commit/push persist the refreshed badge (only on push to master).
          # The commit happens before the assertion, so the badge is committed
          # even when the gate fails. GITHUB_TOKEN commits don't retrigger CI.
          commit: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          badge-style: for-the-badge
          # assert-index alerts (fails the run) when the score is out of range.
          assert-index: '8.0-10.0'

      - name: Summary
        if: ${{ always() }}
        run: |
          echo "Vibe Index: ${{ steps.vibe.outputs.vibe-index }}/10.0"
          echo "Human code: ${{ steps.vibe.outputs.human-percentage }}%"
          echo "Human commits: ${{ steps.vibe.outputs.human-commits-percentage }}%"
