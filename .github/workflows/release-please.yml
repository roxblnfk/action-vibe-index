name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # config-file / manifest-file are the defaults, listed here for clarity.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Refresh the Vibe Index badge on the open release PR so it ships with the
      # release (the same pattern as the testo project). Runs only while the
      # release PR exists; the badge change is reviewed and merged with it.
      - name: Checkout release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          fetch-depth: 0

      - name: Update Vibe Index badge
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: ./
        with:
          badge-discovery: markdown
          badge-style: for-the-badge
          # No commit here: the workflow triggers on push to master, so the
          # action's own push would target master, not the checked-out PR branch.
          # Commit & push below with plain git, which pushes the PR branch.

      - name: Commit & push the badge to the release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          if git diff --quiet; then
            echo "Badge already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: update Vibe Index badge"
          git push

      # When a release is published, keep the floating major/minor tags
      # (e.g. v1, v1.2) pointing at the latest release so consumers can pin
      # `roxblnfk/vibe-index@v1`.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0

      - name: Update floating major and minor tags
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAJOR: ${{ steps.release.outputs.major }}
          MINOR: ${{ steps.release.outputs.minor }}
          SHA: ${{ steps.release.outputs.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "v${MAJOR}" "${SHA}"
          git tag -f "v${MAJOR}.${MINOR}" "${SHA}"
          git push --force origin "v${MAJOR}"
          git push --force origin "v${MAJOR}.${MINOR}"
